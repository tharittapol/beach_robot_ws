; PlatformIO Project Configuration File

[platformio]
default_envs = esp32_main

; ----------------------------
; ESP32 ตัวที่ 1: MAIN board (USB <-> Jetson, motor, IMU, ultrasonic)
; ----------------------------
[env:esp32_main]
platform = espressif32
board = esp32dev
framework = arduino

build_src_filter =
    -<*>
    +<main_esp.cpp>
    +<imu.cpp>
    +<ultrasonic.cpp>
    +<motor.cpp>
    +<pid.cpp>
    +<initial.cpp>
    +<vibration.cpp>

upload_port = /dev/ttyESP32
upload_speed = 115200

monitor_port = /dev/ttyESP32
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

lib_deps =
    adafruit/Adafruit BNO055 @ ^1.6.2
    adafruit/Adafruit Unified Sensor @ ^1.1.15
    bblanchon/ArduinoJson @ ^7.0.4

; ----------------------------
; ESP32 ตัวที่ 2: ENC board (encoder + buzzer)
; ----------------------------
[env:esp32_enc]
platform = espressif32
board = esp32dev
framework = arduino

build_src_filter =
    -<*>
    +<enc_esp.cpp>
    +<encoder.cpp>
    +<buzzer.cpp>

upload_port = /dev/ttyUSB0
upload_speed = 115200

monitor_port = /dev/ttyUSB0
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
