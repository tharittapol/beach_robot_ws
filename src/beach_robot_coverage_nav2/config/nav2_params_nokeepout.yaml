# Nav2 params WITHOUT the keepout boundary (used by default for coverage).
# Identical to nav2_params_keepout.yaml except:
#   * no keepout_filter on either costmap (no boundary enforcement),
#   * global_costmap drops the static/keepout-mask layer and is instead a rolling window
#     sized to cover the work area (the static layer used to provide the global size).
# This is what lets the between-pass deadheads loop outside the cleaning rectangle.
# Pass use_keepout:=true at launch to fall back to nav2_params_keepout.yaml.
amcl:
  ros__parameters:
    use_sim_time: false
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/local
    default_bt_xml_filename: "navigate_w_replanning_and_recovery.xml"
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator/NavigateThroughPosesNavigator"
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    controller_plugins: ["FollowPath"]
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 8.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.35
      yaw_goal_tolerance: 2.0
      stateful: true
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.17
      min_approach_linear_velocity: 0.05
      use_rotate_to_heading: false
      rotate_to_heading_angular_vel: 0.57
      lookahead_dist: 0.40
      min_lookahead_dist: 0.20
      max_lookahead_dist: 0.60
      use_velocity_scaled_lookahead_dist: false
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.30
      regulated_linear_scaling_min_speed: 0.05
      use_cost_regulated_linear_velocity_scaling: false
      allow_reversing: false
      transform_tolerance: 0.2
planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      use_astar: true
      allow_unknown: true
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.10
      # No static map without keepout — use a rolling window large enough to contain the
      # work area + deadhead loops as the robot moves.
      rolling_window: true
      width: 40
      height: 40
      track_unknown_space: false
      plugins: ["inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.6
        cost_scaling_factor: 10.0
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 12
      height: 12
      resolution: 0.05
      track_unknown_space: false
      plugins: ["voxel_layer", "range_sensor_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        observation_sources: zed_points
        zed_points:
          topic: "/zed/filtered_cloud"
          clearing: true
          marking: true
          data_type: "PointCloud2"
          raytrace_max_range: 8.0
          obstacle_max_range: 6.0
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 1.5
      range_sensor_layer:
        plugin: "nav2_costmap_2d::RangeSensorLayer"
        enabled: true
        topics: ["/ultrasonic/left", "/ultrasonic/middle", "/ultrasonic/right"]
        phi: 0.52
        max_reading: 2.5
        clear_on_max_reading: true
        inflation_radius: 0.45
        sensor_frame: ""
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.6
        cost_scaling_factor: 10.0
