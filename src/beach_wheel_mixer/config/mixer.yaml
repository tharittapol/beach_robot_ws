wheel_mps_mixer:
  ros__parameters:
    input_topic: /cmd_vel
    output_topic: /wheel_cmd

    front_track_width: 0.734
    rear_track_width: 1.179

    # Floor testing showed the inside wheels keep rolling and the outside wheels
    # load down during joystick curves, so use extra yaw authority for moving
    # curves. In-place spin remains separately tuned below.
    turn_gain_front: 1.35
    turn_gain_rear: 1.55
    in_place_linear_threshold: 0.05
    in_place_angular_threshold: 0.05
    turn_gain_front_in_place: 1.0
    turn_gain_rear_in_place: 1.0

    front_left_scale: 1.0
    front_right_scale: 1.0
    rear_left_scale: 1.0
    rear_right_scale: 1.0

    publish_rate_hz: 50.0
    cmd_timeout_ms: 300

    # Conservative floor-test limits. Nav2 can override these later with a
    # separate config once the drivetrain is validated on sand/grass.
    max_v: 0.35
    max_w: 0.40

    # Match current ESP32 VMAX feed-forward tuning.
    max_wheel_fl_mps: 1.25
    max_wheel_fr_mps: 1.10
    max_wheel_rl_mps: 9.70
    max_wheel_rr_mps: 8.60

    max_accel_mps2: 0.6
    max_decel_mps2: 4.0

    dir_fl: 1
    dir_fr: 1
    dir_rl: 1
    dir_rr: 1
