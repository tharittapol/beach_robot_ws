wheel_mps_mixer:
  ros__parameters:
    input_topic: /cmd_vel
    output_topic: /wheel_cmd

    front_track_width: 0.734
    rear_track_width: 1.179

    # Start from the smoother indoor baseline, then trim for the higher-friction
    # outdoor surface. Keep pure yaw disabled; use rolling arcs for turning.
    turn_gain_front: 2.45
    turn_gain_rear: 0.90
    in_place_linear_threshold: 0.03
    in_place_angular_threshold: 0.05
    turn_gain_front_in_place: 0.00
    turn_gain_rear_in_place: 0.00
    # Limit yaw dynamically. A small negative value lets the inside front wheel
    # reverse gently for tighter outdoor arcs without jumping to spot-turn.
    min_curve_inner_mps: -0.02

    front_left_scale: 1.0
    front_right_scale: 1.0
    rear_left_scale: 1.0
    rear_right_scale: 1.0

    publish_rate_hz: 50.0
    cmd_timeout_ms: 300

    # Conservative floor-test limits. Nav2 can override these later with a
    # separate config once the drivetrain is validated on sand/grass.
    max_v: 0.35
    max_w: 0.35

    # Match current ESP32 VMAX feed-forward tuning.
    max_wheel_fl_mps: 1.25
    max_wheel_fr_mps: 1.10
    max_wheel_rl_mps: 9.70
    max_wheel_rr_mps: 8.60

    max_accel_mps2: 0.6
    max_decel_mps2: 4.0

    dir_fl: 1
    dir_fr: 1
    dir_rl: 1
    dir_rr: 1
